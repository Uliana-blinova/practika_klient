<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <script defer src="js/vue.js"></script>
    <script defer src="js/main.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <title>Product App</title>
</head>
<body>
<div id="app">
    <div class="cart" @click="showModal = true">
        <p>Cart({{ cart.length }})</p>
    </div>

    <div v-show="showModal" class="modal-overlay" @click.self="showModal = false">
        <div class="modal-content">
            <div class="close-btn" @click="showModal = false">×</div>
            <h2>Shopping Cart</h2>

            <div v-if="cart.length === 0">
                <p>Your cart is empty</p>
            </div>

            <div v-else>
                <div v-for="(item, index) in cart" :key="index" class="cart-item">
                    <img :src="item.image" :alt="item.name" class="cart-item-image">
                    <div class="cart-item-info">
                        <h3>{{ item.name }}</h3>
                        <p>Color: {{ item.color }}</p>
                        <p>Shipping: {{ item.shipping === 'Free' ? 'Free' : '$' + item.shipping }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <product :premium="premium" @add-to-cart="updateCart" @remove-from-cart="removeFromCart"></product>
</div>
</body>
</html>
